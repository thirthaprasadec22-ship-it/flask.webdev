<!DOCTYPE html>
<html>
<head>
<title>Notes App</title>
</head>
<body>

<h1>My Notes</h1>

<form method="POST">
<input type="text" name="note" placeholder="Write a note">
<button type="submit">Add Note</button>
</form>

<h2>Saved Notes</h2>

<ul>
{% for note in notes %}
<li>{{ note }}</li>
{% endfor %}
</ul>

</body>
</html>
